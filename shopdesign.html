<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <title>Shop</title>

    <style>

        body{
            font-family: Arial;
            background: #87c76e;
            text-align: center;
            color: white;
        }

        h1{
            font-size: 50px;
        }

        #moneyText{
            font-size: 25px;
        }

        .shop-container{
            display: grid;
            justify-content: center;
            gap: 25px;
            margin-top: 30px;
            grid-template-columns: repeat(4, auto);
        }

        .item-box{
            background: #fff8dc;
            color: black;
            width: 180px;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 2px 2px 10px rgba(0,0,0,0.2);
        }

        .item-box h2{
            margin-bottom: 10px;
        }

        button{
            margin-top: 10px;
            padding: 10px 20px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            background: orange;
            font-size: 16px;
        }

        button:hover{
            background: darkorange;
        }

        #inventoryBox{
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
            margin-top: 20px;
        }   

    </style>
</head>
<body>

    <h1>Grocery Shop</h1>

    <p id="moneyText">Money: 100</p>

    <div class="shop-container">

        <div class="item-box">
            <h2>Fish</h2>
            <p>Price: 10</p>

            <button onclick="buyItem('Fish')">
                Buy
            </button>
        </div>

        <div class="item-box">
            <h2>Meat</h2>
            <p>Price: 25</p>

            <button onclick="buyItem('Meat')">
                Buy
            </button>
        </div>

        <div class="item-box">
            <h2>Carrot</h2>
            <p>Price: 20</p>

            <button onclick="buyItem('Carrot')">
                Buy
            </button>
        </div>

         <div class="item-box">
            <h2>Corn</h2>
            <p>Price: 10</p>

            <button onclick="buyItem('Corn')">
                Buy
            </button>
        </div>

         <div class="item-box">
            <h2>Seed</h2>
            <p>Price: 20</p>

            <button onclick="buyItem('Seed')">
                Buy
            </button>
        </div>

         <div class="item-box">
            <h2>Lettuce</h2>
            <p>Price: 15</p>

            <button onclick="buyItem('Lettuce')">
                Buy
            </button>
        </div>

         <div class="item-box">
            <h2>Wheat</h2>
            <p>Price: 10</p>

            <button onclick="buyItem('Wheat')">
                Buy
            </button>
        </div>

         <div class="item-box">
            <h2>Grass</h2>
            <p>Price: 10</p>

            <button onclick="buyItem('Grass')">
                Buy
            </button>
        </div>


    </div>

    <p id="resultText"></p>

    <h2>Inventory</h2>

    <div id="inventoryBox"></div>

<button onclick="resetGame()">
        Reset Game
        </button>

<script src="shop.js"></script>
    
</body>
</html>
