<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <title>Shop</title>

    <style>

        body{
            font-family: Arial;
            text-align: center;
            color: white;
            background-image: url("image/shopbg.png");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            min-height: 100vh;
            margin: 0;
        }

        h1{
            font-size: 50px;
        }

        #moneyText{
            font-size: 25px;
        }

        .shop-container{
            display: grid;
            justify-content: center;
            gap: 25px;
            margin-top: 30px;
            grid-template-columns: repeat(4, auto);
        }

        .item-box{
            background: #fff8dc;
            color: black;
            width: 180px;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 2px 2px 10px rgba(0,0,0,0.2);
        }

        .item-box h2{
            margin-bottom: 10px;
        }

        .item-image{
            width: 100px;
            height: 100px;
            object-fit: contain;
            display: block;
            margin: 0 auto 10px auto;
        }

        button{
            margin-top: 10px;
            padding: 10px 20px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            background: orange;
            font-size: 16px;
        }

        button:hover{
            background: darkorange;
        }

        #inventoryBox{
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
            margin-top: 20px;
        }   

        #inventoryBox .item-box{
            width: 130px;
            padding: 10px;
        }

        #inventoryBox .item-image{
            width: 60px;
            height: 60px;
        }

        .inventory-btn{
            margin-top: 10px;
            padding: 10px 20px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            background: orange;
            font-size: 16px;
        }

        .inventory-btn:hover{
            background: darkorange;
        }

        .popup{
            display: none;
            position: fixed;
            z-index: 999;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.6);
        }

        .popup-content{
            background: #fff8dc;
            color: black;
            width: 700px;
            max-width: 90%;
            margin: 80px auto;
            padding: 20px;
            border-radius: 15px;
        }

        .close-btn{
            float: right;
            font-size: 30px;
            cursor: pointer;
            font-weight: bold;
        }

        .popup-content{
            background: #fff8dc;
            color: black;
            width: 700px;
            max-width: 90%;
            margin: 80px auto;
            padding: 20px;
            border-radius: 15px;

            max-height: 70vh;
            overflow-y: auto;
        }

    </style>
</head>
<body>

    <h1>Grocery Shop</h1>

    <p id="moneyText">Money: 100</p>

    <div class="shop-container">

        <div class="item-box">
            <img src="image/carrot.png" alt="Carrot" class="item-image">
            <h2>Carrot</h2>
            <p>Price: 20</p>

            <button onclick="buyItem('Carrot')">
                Buy
            </button>
        </div>

         <div class="item-box">
            <img src="image/corn.png" alt="Corn" class="item-image">
            <h2>Corn</h2>
            <p>Price: 10</p>

            <button onclick="buyItem('Corn')">
                Buy
            </button>
        </div>

         <div class="item-box">
            <img src="image/seed.png" alt="Seed" class="item-image">
            <h2>Seed</h2>
            <p>Price: 20</p>

            <button onclick="buyItem('Seed')">
                Buy
            </button>
        </div>

         <div class="item-box">
            <img src="image/lettuce.png" alt="Lettuce" class="item-image">
            <h2>Lettuce</h2>
            <p>Price: 15</p>

            <button onclick="buyItem('Lettuce')">
                Buy
            </button>
        </div>

         <div class="item-box">
            <img src="image/wheat.png" alt="Wheat" class="item-image">
            <h2>Wheat</h2>
            <p>Price: 10</p>

            <button onclick="buyItem('Wheat')">
                Buy
            </button>
        </div>

         <div class="item-box">
            <img src="image/grass.png" alt="Grass" class="item-image">
            <h2>Grass</h2>
            <p>Price: 10</p>

            <button onclick="buyItem('Grass')">
                Buy
            </button>
        </div>


    </div>

    <p id="resultText"></p>

    <button class="inventory-btn" onclick="openInventory()">
        Open Inventory
    </button>

    <div id="inventoryPopup" class="popup">
        <div class="popup-content">

            <span class="close-btn" onclick="closeInventory()">
                &times;
            </span>

            <h2>Inventory</h2>

            <div id="inventoryBox"></div>

        </div>
    </div>

<button onclick="resetGame()">
        Reset Game
        </button>
<button onclick="toggleMusic()">
         Music
        </button>
<button onclick="window.location.href='index.html'">
        Back to Farm
        </button>

<script src="sharedInventory.js"></script>
<script src="shop.js"></script>
    
</body>
</html>
