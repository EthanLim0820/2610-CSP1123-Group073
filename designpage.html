<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">

        <style>
            body {
                font-family: Arial;
                background: #87c76e;
                color: #333;
                text-align: center;
                margin: 0;
            }

            h1 {
                font-size: 65px;
                color: white;
                text-shadow: 2px 2px #5a8f4c;
            }

            .start-btn {
                margin-top: 10px;
                padding: 10px 20px;
                font-size: 16px;
                border: none;
                border-radius: 10px;
                background: #ffd166;
                color: #333;
                cursor: pointer;
            }

            .start-btn:hover{
                background: #ffb703;
            }
                
            .game-box {
                background: #fff8dc;
                width: 420px;
                margin: 30px auto;
                padding: 25px;
                border-radius: 15px;
                border: 4px solid #d4a373;
                text-align: center;
            }

            p {
                margin-bottom: 20px;
            }

            .cookUI {
                background: #fff;
                padding: 15px;
                border-radius: 12px;
                width: 260px;
                border: 3px solid #d4a373;
                margin-top: 15px;
                margin-left: auto;
                margin-right: auto;
            }

            .cookUI input[type="range"] {
                width: 100%;
                margin-top: 10px;
            }

            select {
                background: #ffd166;
                color: #333;
                border: none;
                border-radius: 10px;
                padding: 6px 12px;
                font-weight: bold;
                box-shadow: 2px 2px #5a8f4c;
            }

            select:hover {
                background: #a8e6a3;
            }

            select {
                appearance: none;
                -webkit-appearance: none;
                -moz-appearance: none;
            }

            .music-frame {
                display: none;
                width: 420px;
                height: 250px;
                margin: 20px auto;
                border: 3px solid #d4a373;
                border-radius: 12px;
            }
        </style>
