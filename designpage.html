<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">

        <style>
            body {
                font-family: Arial;
                background: #87c76e;
                color: #333;
                text-align: center;
                margin: 0;
            }

            h1 {
                font-size: 32px;
                color: #5a8f4c;
                margin-top: 40px;
            }

            .start-btn {
                margin-top: 10px;
                padding: 10px 20px;
                font-size: 16px;
                border: none;
                border-radius: 10px;
                background: #ffd166;
                color: #333;
                cursor: pointer;
            }

            .start-btn:hover{
                background: #ffb703;
            }
                
            .game-box {
                background: #fff8dc;
                width: 420px;
                margin: 30px auto;
                padding: 25px;
                border-radius: 15px;
                border: 4px solid #d4a373;
                text-align: center;
            }

            p {
                margin-bottom: 20px;
            }

            .cookUI {
                background: #fff;
                padding: 15px;
                border-radius: 12px;
                width: 260px;
                margin: 20px auto;
                border: 3px solid #d4a373;
            }

            .cookUI input[type="range"] {
                width: 100%;
                margin-top: 10px;
            }
        </style>
        </head>

        <body>
            <h1>Start Cooking!</h1>

            <button class="start-btn" onclick="startCooking(1)">
                Start Cooking
            </button>
            <div class="game-box">
                <p>Cook the food perfectly!</p>
            </div>

            <script src="cookingfunction.js"></script>
        </body>
</html>
