<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">

        <style>
            body {
                font-family: Arial;
                color: #333;
                text-align: center;
                margin: 0;
                background-image: url("image/cookingBackground.png");
                background-size: cover;
                background-position: center;
                background-repeat: no-repeat;
                background-attachment: fixed;
            }

            h1 {
                font-size: 65px;
                color: white;
                text-shadow: 2px 2px #5a8f4c;
            }

            .start-btn {
                margin-top: 10px;
                padding: 10px 20px;
                font-size: 16px;
                border: none;
                border-radius: 10px;
                background: #ffd166;
                color: #333;
                cursor: pointer;
            }

            .start-btn:hover{
                background: #ffb703;
            }
                
            .game-box {
                background: #fff8dc;
                width: 420px;
                margin: 30px auto;
                padding: 25px;
                border-radius: 15px;
                border: 4px solid #d4a373;
                text-align: center;
            }

            p {
                margin-bottom: 20px;
            }

            .cookUI {
                background: #fff;
                padding: 15px;
                border-radius: 12px;
                width: 260px;
                border: 3px solid #d4a373;
                margin-top: 15px;
                margin-left: auto;
                margin-right: auto;
            }

            .cookUI input[type="range"] {
                width: 100%;
                margin-top: 10px;
            }

            select {
                background: #ffd166;
                color: #333;
                border: none;
                border-radius: 10px;
                padding: 6px 12px;
                font-weight: bold;
                box-shadow: 2px 2px #5a8f4c;
            }

            select:hover {
                background: #a8e6a3;
            }

            select {
                appearance: none;
                -webkit-appearance: none;
                -moz-appearance: none;
            }

            .music-frame {
                display: none;
                width: 420px;
                height: 250px;
                margin: 20px auto;
                border: 3px solid #d4a373;
                border-radius: 12px;
            }

            #inventoryBox{
                display: flex;
                justify-content: center;
                gap: 15px;
                flex-wrap: wrap;
                margin-top: 20px;
            }

            .inventory-item{
                background: #fff8dc;
                color: rgb(17, 14, 14);
                width: 120px;
                padding: 10px;
                border-radius: 15px;
                box-shadow: 2px 2px 10px rgba(0,0,0,0.2);
            }

            .inventory-item img{
                width: 60px;
                height: 60px;
                object-fit: contain;
            }
            
            .inventory-title{
                color: white;
                text-shadow: 3px 3px 5px black;
                font-size: 32px;
            }

            .inventory-btn{
                margin-top: 10px;
                padding: 10px 20px;
                font-size: 16px;
                border: none;
                border-radius: 10px;
                background: #ffd166;
                cursor: pointer;
            }

            .inventory-btn:hover{
                background: #ffb703;
            }

            .popup{
               display: none;
                position: fixed;
                z-index: 999;
                left: 0;
                top: 0;
                width: 100%;
                height: 100%;
                background: rgba(0,0,0,0.6);
            }

            .popup-content{
                background: #fff8dc;
                width: 600px;
                max-width: 90%;
                margin: 80px auto;
                padding: 20px;
                border-radius: 15px;
                border: 4px solid #d4a373;
            }

            .close-btn{
                float: right;
                font-size: 30px;
                cursor: pointer;
                font-weight: bold;
            }
            
            .music-btn{
                margin-top: 10px;
                padding: 10px 20px;
                font-size: 16px;
                border: none;
                border-radius: 10px;
                background: #ffd166;
                color: #333;
                cursor: pointer;
            }

            .music-btn:hover{
                background: #ffb703;
            }

            .popup-content{
            background: #fff8dc;
            color: black;
            width: 700px;
            max-width: 90%;
            margin: 80px auto;
            padding: 20px;
            border-radius: 15px;

            max-height: 70vh;
            overflow-y: auto;
        }

        </style>
        </head>

        <body>
            <h1>Start Cooking!</h1>

            <button class="start-btn" onclick="startCooking(1)">
                Start Cooking
            </button>
            <br>
            <button class="music-btn" onclick="toggleMusic()"> Music</button>
            <button class="music-btn" onclick="goToGamePage('index.html')">Back to Farm</button>
            <div class="game-box">
                <p>Cook the food perfectly!</p>
            </div>
            <button class="inventory-btn" onclick="openInventory()">
                Open Inventory
            </button>

            <div id="inventoryPopup" class="popup">
                <div class="popup-content">
                    <span class="close-btn" onclick="closeInventory()">&times;</span>

                    <h2>Cooked Inventory</h2>

                    <div id="inventoryBox"></div>
                </div>
            </div>

            <button onclick="resetCookedGame()">
                Reset Cooked Inventory
            </button>

            <script src="sharedInventory.js"></script>
            <script src="cooking.js"></script>

        </body>
</html>
