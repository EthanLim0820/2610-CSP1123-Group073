<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Farm Sales Demo</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5efe2;
      color: #2f241b;
      margin: 0;
      padding: 32px;
    }

    .panel {
      max-width: 560px;
      background: #fffaf1;
      border: 2px solid #c9b38d;
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
    }

    h1 {
      margin-top: 0;
    }

    #moneyDisplay,
    #customerOrder,
    #salesStatus {
      margin-bottom: 16px;
      font-size: 18px;
    }

    #salesButtons {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    button {
      border: 0;
      border-radius: 10px;
      padding: 10px 14px;
      background: #7fb069;
      color: white;
      cursor: pointer;
      font-size: 15px;
    }

    button:hover {
      background: #679153;
    }
  </style>
</head>
<body>
  <div class="panel">
    <h1>Farm Customer Sales</h1>
    <div id="customer"></div>
  </div>

  <script src="customersales.js"></script>
</body>
</html>
